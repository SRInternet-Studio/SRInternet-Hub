name: Update Hub img task

on:
  push:
    paths:
      - 'images/**'
    branches:
      - main

jobs:
  update-and-deploy:
    name: Update Hub img task
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Pillow
        run: pip install Pillow
      
      - name: Generate imglist.json
        run: |
          cat > generate_imglist.py << 'EOF'
          import json
          import os
          from pathlib import Path
          from datetime import datetime
          from PIL import Image
          
          img_folder = Path("images")
          output_file = "imglist.json"
          
          image_extensions = {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.ico'}
          
          files_info = []
          image_count = 0
          
          for file_path in sorted(img_folder.rglob('*')):
              if not file_path.is_file():
                  continue
              
              file_name = file_path.name
              ext = file_path.suffix.lower()
              is_image = ext in image_extensions
              
              mtime = file_path.stat().st_mtime
              updated_at = datetime.fromtimestamp(mtime).isoformat()
              
              width = None
              height = None
              
              if is_image:
                  try:
                      with Image.open(file_path) as img:
                          width, height = img.size
                      image_count += 1
                  except Exception as e:
                      print(f"Warning: Cannot read {file_name} dimensions - {e}")
              
              files_info.append({
                  "name": file_name,
                  "updated_at": updated_at,
                  "width": width,
                  "height": height
              })
          
          output = {
              "total_count": len(files_info),
              "image_count": image_count,
              "generated_at": datetime.now().isoformat(),
              "files": files_info
          }
          
          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump(output, f, indent=2, ensure_ascii=False)
          
          print(f"Generated {output_file}, total {len(files_info)} files")
          EOF
          
          python3 generate_imglist.py
          cat imglist.json
      
      - name: Commit imglist.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imglist.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update imglist.json [skip ci]"
          git push
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp -r img deploy/
          cp imglist.json deploy/
          
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Image Gallery</title>
              <meta charset="utf-8">
              <style>
                  body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
                  h1 { color: #333; }
                  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
                  .image-card { border: 1px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; }
                  .image-card img { max-width: 100%; height: auto; border-radius: 4px; }
                  .image-card p { margin: 10px 0 0; font-size: 12px; word-break: break-all; }
                  .info { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px; }
                  .dimension { color: #666; font-size: 11px; }
              </style>
          </head>
          <body>
              <h1>Image Gallery</h1>
              <div class="info">
                  <p>Loading image list...</p>
              </div>
              <div class="gallery" id="gallery"></div>
              
              <script>
                  fetch('imglist.json')
                      .then(res => res.json())
                      .then(data => {
                          document.querySelector('.info').innerHTML = `
                              <p>Total: ${data.total_count} files | Images: ${data.image_count}</p>
                              <p>Generated: ${data.generated_at}</p>
                          `;
                          
                          const gallery = document.getElementById('gallery');
                          data.files.forEach(file => {
                              const ext = file.name.split('.').pop().toLowerCase();
                              const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp'].includes(ext);
                              
                              const card = document.createElement('div');
                              card.className = 'image-card';
                              
                              let dimensionHtml = '';
                              if (file.width && file.height) {
                                  dimensionHtml = `<div class="dimension">${file.width} x ${file.height}</div>`;
                              }
                              
                              if (isImage) {
                                  card.innerHTML = `
                                      <img src="img/${file.name}" alt="${file.name}" onerror="this.style.display='none'">
                                      <p>${file.name}</p>
                                      ${dimensionHtml}
                                      <p>${new Date(file.updated_at).toLocaleString()}</p>
                                  `;
                              } else {
                                  card.innerHTML = `
                                      <div style="height:150px; display:flex; align-items:center; justify-content:center; background:#f9f9f9;">
                                          Non-image file
                                      </div>
                                      <p>${file.name}</p>
                                      <p>${new Date(file.updated_at).toLocaleString()}</p>
                                  `;
                              }
                              gallery.appendChild(card);
                          });
                      });
              </script>
          </body>
          </html>
          EOF
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
